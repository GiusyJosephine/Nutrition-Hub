<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Nutrition Hub"/>
  <meta name="theme-color" content="#0f0f0f"/>
  <title>Nutrition Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:#0f0f0f;overflow:hidden}
    #root{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
    ::-webkit-scrollbar{width:0;height:0}
    input,select,button{font-family:'Sora',sans-serif;-webkit-appearance:none;appearance:none}
    input:focus,select:focus{outline:none}
    .tap{transition:all 0.15s;cursor:pointer}.tap:active{transform:scale(0.95);opacity:0.85}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect } = React;
// ─── STORAGE ──────────────────────────────────────────────────────────────────
const SK = {
  PROFILES:"napp_profiles", FOODS:"napp_foods", RECIPES:"napp_recipes",
  MEAL_PLAN:"napp_meal_plan", SPLITS:"napp_slot_splits", DAY_TYPES:"napp_day_types",
  STORES:"napp_stores",
};
const load=(key,fb)=>{try{const v=localStorage.getItem(key);return v?JSON.parse(v):fb;}catch{return fb;}};
const save=(key,val)=>{try{localStorage.setItem(key,JSON.stringify(val));}catch{}};

// ─── DEFAULTS ─────────────────────────────────────────────────────────────────
const DEFAULT_PROFILES={
  giusy: {name:"Giusy", on:{kcal:1800,p:112,g:45,c:236},  off:{kcal:1800,p:140,g:62,c:170}},
  davide:{name:"Davide",on:{kcal:3500,p:202,g:70,c:515},  off:{kcal:3500,p:246,g:114,c:373}},
};
const DEFAULT_SPLITS={colazione:20,spuntino_mattina:10,pranzo:35,spuntino_pomeriggio:10,cena:25};
const DEFAULT_STORES=[
  {id:"s1",name:"Eurospin",   cats:["Frutta","Verdura","Alimenti","Banco Frigo","Banco Surgelati","Macelleria","Pescheria","Detersivi","Cura della persona"]},
  {id:"s2",name:"Martinelli", cats:["Frutta","Verdura","Alimenti","Banco Frigo","Banco Surgelati","Macelleria","Pescheria","Detersivi","Cura della persona"]},
  {id:"s3",name:"Macelleria", cats:["Carne","Alimenti"]},
  {id:"s4",name:"NaturaSì",   cats:["Alimenti","Detersivi"]},
];
const SLOTS=[
  {id:"colazione",           label:"Colazione",           icon:"☀️"},
  {id:"spuntino_mattina",    label:"Spuntino mattina",    icon:"🍎"},
  {id:"pranzo",              label:"Pranzo",              icon:"🍽️"},
  {id:"spuntino_pomeriggio", label:"Spuntino pomeriggio", icon:"🥜"},
  {id:"cena",                label:"Cena",                icon:"🌙"},
];
const DAYS_IT=["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];
const STORE_COLORS=["#a8e6cf","#82b4ff","#ffb347","#ff87ab","#c3a8ff","#ffd6a5"];

// ─── CALC ENGINE ──────────────────────────────────────────────────────────────
function calcGrams(foodItems,targetKcal,targetP,targetG,targetC){
  if(!foodItems.length||targetKcal<=0) return {};
  const n=foodItems.length;
  if(!targetP&&!targetG&&!targetC){
    const res={},pf=targetKcal/n;
    foodItems.forEach(it=>{res[it.id]=Math.max(5,Math.round((pf/(it.kcal||1))*100));});
    return res;
  }
  const tK=(targetP||0)*4+(targetG||0)*9+(targetC||0)*4||targetKcal;
  const fs=foodItems.map(f=>({id:f.id,kcal:f.kcal||1,p:f.p||0,g:f.g||0,c:f.c||0}));
  const role=f=>{const fp=f.p*4,fg=f.g*9,fc=f.c*4,mx=Math.max(fp,fg,fc);return mx===0?"k":fp===mx?"p":fg===mx?"g":"c";};
  const roles=fs.map(role);
  const cnt=r=>Math.max(1,roles.filter(x=>x===r).length);
  const cP=cnt("p"),cG=cnt("g"),cC=cnt("c");
  const ga=fs.map((f,i)=>{
    const r=roles[i];
    if(r==="p"&&f.p>0) return Math.max(5,((targetP||0)/cP)/(f.p/100));
    if(r==="g"&&f.g>0) return Math.max(5,((targetG||0)/cG)/(f.g/100));
    if(r==="c"&&f.c>0) return Math.max(5,((targetC||0)/cC)/(f.c/100));
    return Math.max(5,(tK/n)/(f.kcal/100));
  });
  for(let i=0;i<80;i++){
    const tP=fs.reduce((s,f,j)=>s+f.p*(ga[j]/100),0);
    const tG=fs.reduce((s,f,j)=>s+f.g*(ga[j]/100),0);
    const tC=fs.reduce((s,f,j)=>s+f.c*(ga[j]/100),0);
    const tKc=fs.reduce((s,f,j)=>s+f.kcal*(ga[j]/100),0);
    if((targetP>0?Math.abs(tP-targetP)/targetP:0)<0.02&&
       (targetG>0?Math.abs(tG-targetG)/targetG:0)<0.02&&
       (targetC>0?Math.abs(tC-targetC)/targetC:0)<0.02) break;
    const lr=0.4;
    fs.forEach((f,j)=>{
      const r=roles[j];let sc=1;
      if(r==="p"&&f.p>0&&tP>0&&targetP>0) sc=1+lr*((targetP/cP)/(tP/cP)-1);
      else if(r==="g"&&f.g>0&&tG>0&&targetG>0) sc=1+lr*((targetG/cG)/(tG/cG)-1);
      else if(r==="c"&&f.c>0&&tC>0&&targetC>0) sc=1+lr*((targetC/cC)/(tC/cC)-1);
      else if(tKc>0&&tK>0) sc=1+lr*(tK/tKc-1);
      ga[j]=Math.max(5,ga[j]*sc);
    });
  }
  const res={};fs.forEach((f,i)=>{res[f.id]=Math.round(ga[i]);});return res;
}
function macrosFromGrams(food,grams){
  const f=grams/100;
  return{kcal:Math.round(food.kcal*f),p:Math.round(food.p*f*10)/10,g:Math.round(food.g*f*10)/10,c:Math.round(food.c*f*10)/10};
}

// ─── DATE ─────────────────────────────────────────────────────────────────────
function getWeekDates(offset=0){
  const today=new Date(),mon=new Date(today);
  mon.setDate(today.getDate()-((today.getDay()+6)%7)+offset*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d.toISOString().split("T")[0];});
}
function fmtDate(iso){const[,m,d]=iso.split("-");return `${d}/${m}`;}
function fmtDateFull(iso){const[y,m,d]=iso.split("-");return `${d}/${m}/${y}`;}
function todayISO(){return new Date().toISOString().split("T")[0];}

// ─── MICRO UI ─────────────────────────────────────────────────────────────────
function MacroBar({label,val,target,color}){
  const pct=Math.min(100,Math.round((val/(target||1))*100)),over=val>target*1.05;
  return(
    <div style={{marginBottom:5}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:2,fontFamily:"'DM Mono',monospace"}}>
        <span style={{color:"#777"}}>{label}</span>
        <span style={{color:over?"#ff6b6b":"#bbb"}}>{val}g/{target}g</span>
      </div>
      <div style={{height:4,background:"#2a2a2a",borderRadius:2,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:"100%",background:over?"#ff6b6b":color,borderRadius:2,transition:"width 0.4s"}}/>
      </div>
    </div>
  );
}
function KcalRing({current,target,size=78}){
  const pct=Math.min(1,current/(target||1)),r=(size/2)-7,circ=2*Math.PI*r,over=current>target*1.05;
  return(
    <svg width={size} height={size} style={{display:"block"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#2a2a2a" strokeWidth={5}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={over?"#ff6b6b":"#a8e6cf"}
        strokeWidth={5} strokeDasharray={`${pct*circ} ${circ}`} strokeLinecap="round"
        transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:"stroke-dasharray 0.5s"}}/>
      <text x={size/2} y={size/2-3} textAnchor="middle" fill="#fff" fontSize={12} fontWeight={700} fontFamily="'DM Mono',monospace">{current}</text>
      <text x={size/2} y={size/2+11} textAnchor="middle" fill="#555" fontSize={8} fontFamily="'DM Mono',monospace">/{target}</text>
    </svg>
  );
}
function ModalOverlay({children,onClose}){
  return(
    <div style={{position:"fixed",inset:0,background:"#000b",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#141414",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,maxHeight:"88vh",overflowY:"auto",border:"1px solid #252525",borderBottom:"none"}}>
        <div style={{display:"flex",justifyContent:"flex-end",padding:"12px 16px 0"}}>
          <button onClick={onClose} style={{background:"#252525",border:"none",color:"#888",borderRadius:8,width:28,height:28,fontSize:16,cursor:"pointer"}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function NutritionApp(){
  const [profiles,setProfiles]=useState(()=>load(SK.PROFILES,DEFAULT_PROFILES));
  const [foods,setFoods]      =useState(()=>load(SK.FOODS,[]));
  const [recipes,setRecipes]  =useState(()=>load(SK.RECIPES,[]));
  const [mealPlan,setMealPlan]=useState(()=>load(SK.MEAL_PLAN,{}));
  const [splits,setSplits]    =useState(()=>load(SK.SPLITS,DEFAULT_SPLITS));
  const [dayTypes,setDayTypes]=useState(()=>load(SK.DAY_TYPES,{}));
  const [stores,setStores]    =useState(()=>load(SK.STORES,DEFAULT_STORES));
  const [tab,setTab]                   =useState("day");
  const [selectedDate,setSelectedDate] =useState(todayISO());
  const [weekOffset,setWeekOffset]     =useState(0);
  const [modal,setModal]               =useState(null);

  useEffect(()=>{save(SK.PROFILES,profiles);},[profiles]);
  useEffect(()=>{save(SK.FOODS,foods);},[foods]);
  useEffect(()=>{save(SK.RECIPES,recipes);},[recipes]);
  useEffect(()=>{save(SK.MEAL_PLAN,mealPlan);},[mealPlan]);
  useEffect(()=>{save(SK.SPLITS,splits);},[splits]);
  useEffect(()=>{save(SK.DAY_TYPES,dayTypes);},[dayTypes]);
  useEffect(()=>{save(SK.STORES,stores);},[stores]);

  const weekDates=getWeekDates(weekOffset);
  const getDayType=(date,who)=>dayTypes[date]?.[who]||"on";
  const setDayType=(date,who,t)=>setDayTypes(p=>({...p,[date]:{...(p[date]||{}),[who]:t}}));
  const getMacrosForSlot=(who,date,slotId)=>{
    const d=profiles[who][getDayType(date,who)],pct=(splits[slotId]||0)/100;
    return{kcal:Math.round(d.kcal*pct),p:Math.round(d.p*pct*10)/10,g:Math.round(d.g*pct*10)/10,c:Math.round(d.c*pct*10)/10};
  };
  const getSlotItems=(date,slotId)=>mealPlan[date]?.[slotId]||[];
  const getFoodOrRecipe=id=>foods.find(f=>f.id===id)||recipes.find(r=>r.id===id);
  const addItemToSlot=(date,slotId,itemId)=>setMealPlan(p=>{
    const day=p[date]||{},slot=day[slotId]||[];
    if(slot.includes(itemId)) return p;
    return{...p,[date]:{...day,[slotId]:[...slot,itemId]}};
  });
  const removeItemFromSlot=(date,slotId,itemId)=>setMealPlan(p=>{
    const day=p[date]||{},slot=(day[slotId]||[]).filter(id=>id!==itemId);
    return{...p,[date]:{...day,[slotId]:slot}};
  });
  const copyDay=(from,to)=>setMealPlan(p=>({...p,[to]:{...(p[from]||{})}}));
  const computeDayTotals=(who,date)=>{
    let kc=0,pt=0,gr=0,ca=0;
    SLOTS.forEach(s=>{
      const items=getSlotItems(date,s.id).map(id=>getFoodOrRecipe(id)).filter(Boolean);
      const tg=getMacrosForSlot(who,date,s.id);
      const grams=calcGrams(items,tg.kcal,tg.p,tg.g,tg.c);
      items.forEach(item=>{const m=macrosFromGrams(item,grams[item.id]||0);kc+=m.kcal;pt+=m.p;gr+=m.g;ca+=m.c;});
    });
    return{kcal:Math.round(kc),p:Math.round(pt*10)/10,g:Math.round(gr*10)/10,c:Math.round(ca*10)/10};
  };
  const buildShoppingList=(dates)=>{
    const map={};
    dates.forEach(date=>{
      SLOTS.forEach(s=>{
        const ids=getSlotItems(date,s.id);if(!ids.length) return;
        const objs=ids.map(id=>getFoodOrRecipe(id)).filter(Boolean);
        ["giusy","davide"].forEach(who=>{
          const tg=getMacrosForSlot(who,date,s.id);
          const grams=calcGrams(objs,tg.kcal,tg.p,tg.g,tg.c);
          objs.forEach(item=>{if(!map[item.id])map[item.id]={item,total:0};map[item.id].total+=(grams[item.id]||0);});
        });
      });
    });
    return Object.values(map);
  };
  const resetAll=()=>{
    if(!window.confirm("Eliminare tutti i dati?")) return;
    Object.values(SK).forEach(k=>localStorage.removeItem(k));
    setProfiles(DEFAULT_PROFILES);setFoods([]);setRecipes([]);setMealPlan({});
    setSplits(DEFAULT_SPLITS);setDayTypes({});setStores(DEFAULT_STORES);
  };

  const tabLabel={day:fmtDateFull(selectedDate),week:"Settimana",foods:"Alimenti",shopping:"Lista Spesa",settings:"Impostazioni"};

  return(
    <div style={{minHeight:"100vh",background:"#0f0f0f",color:"#e8e8e8",fontFamily:"'Sora',sans-serif",maxWidth:480,margin:"0 auto",paddingBottom:90}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap');
        *{box-sizing:border-box} ::-webkit-scrollbar{width:0;height:0}
        input,select,button{font-family:'Sora',sans-serif;-webkit-appearance:none}
        .tap{transition:all 0.15s;cursor:pointer} .tap:active{transform:scale(0.95)}
        input:focus,select:focus{outline:none;border-color:#a8e6cf!important}
      `}</style>

      {/* HEADER */}
      <div style={{padding:"env(safe-area-inset-top,20px) 18px 10px",paddingTop:"max(20px,env(safe-area-inset-top))",borderBottom:"1px solid #1a1a1a",position:"sticky",top:0,background:"#0f0f0f",zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:9,letterSpacing:3,color:"#444",fontFamily:"'DM Mono',monospace",textTransform:"uppercase"}}>Nutrition Hub</div>
            <div style={{fontSize:20,fontWeight:700,lineHeight:1.2,marginTop:1}}>{tabLabel[tab]}</div>
          </div>
          {tab==="day"&&(
            <div style={{display:"flex",gap:8}}>
              {["giusy","davide"].map(who=>(
                <div key={who} style={{textAlign:"center"}}>
                  <div style={{fontSize:9,color:"#555",marginBottom:3,letterSpacing:1,textTransform:"uppercase"}}>{profiles[who].name}</div>
                  <div style={{display:"flex",gap:3}}>
                    {["on","off"].map(t=>(
                      <button key={t} className="tap" onClick={()=>setDayType(selectedDate,who,t)}
                        style={{padding:"3px 8px",borderRadius:20,border:"none",fontSize:9,fontWeight:700,
                          background:getDayType(selectedDate,who)===t?(t==="on"?"#a8e6cf":"#ffb3ba"):"#1e1e1e",
                          color:getDayType(selectedDate,who)===t?"#0f0f0f":"#555"}}>
                        {t.toUpperCase()}
                      </button>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
        {tab==="day"&&(
          <div style={{display:"flex",gap:5,marginTop:10,overflowX:"auto",paddingBottom:2}}>
            {weekDates.map((d,i)=>{
              const isToday=d===todayISO(),isSel=d===selectedDate;
              return(
                <button key={d} onClick={()=>setSelectedDate(d)} className="tap"
                  style={{minWidth:40,padding:"5px 0",borderRadius:9,border:"none",flexShrink:0,
                    background:isSel?"#a8e6cf":isToday?"#1e2e26":"#161616",
                    color:isSel?"#0f0f0f":isToday?"#a8e6cf":"#555",fontWeight:isSel?700:400,fontSize:10,fontFamily:"'DM Mono',monospace"}}>
                  <div>{DAYS_IT[i]}</div><div style={{fontSize:13,fontWeight:700}}>{d.split("-")[2]}</div>
                </button>
              );
            })}
            <button onClick={()=>setWeekOffset(o=>o-1)} style={{minWidth:28,background:"#161616",border:"none",color:"#555",borderRadius:9,fontSize:16,cursor:"pointer"}}>‹</button>
            <button onClick={()=>setWeekOffset(o=>o+1)} style={{minWidth:28,background:"#161616",border:"none",color:"#555",borderRadius:9,fontSize:16,cursor:"pointer"}}>›</button>
          </div>
        )}
      </div>

      {/* CONTENT */}
      <div style={{padding:"14px 14px 0"}}>
        {tab==="day"&&<DayView {...{selectedDate,profiles,getSlotItems,getMacrosForSlot,getFoodOrRecipe,computeDayTotals,setModal,getDayType,removeItemFromSlot,copyDay,weekDates}}/>}
        {tab==="week"&&<WeekView {...{weekDates,profiles,getSlotItems,getMacrosForSlot,getFoodOrRecipe,computeDayTotals,getDayType,setDayType,setSelectedDate,setTab}}/>}
        {tab==="foods"&&<FoodsView {...{foods,setFoods,recipes,setRecipes,stores}}/>}
        {tab==="shopping"&&<ShoppingView {...{weekDates,buildShoppingList,stores}}/>}
        {tab==="settings"&&<SettingsView {...{profiles,setProfiles,splits,setSplits,stores,setStores,foods,setFoods,resetAll}}/>}
      </div>

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,
        background:"#0f0f0f",borderTop:"1px solid #1a1a1a",display:"flex",
        paddingTop:7,paddingBottom:"max(14px,env(safe-area-inset-bottom))"}}>
        {[{id:"day",icon:"📅",label:"Oggi"},{id:"week",icon:"🗓️",label:"Settimana"},{id:"foods",icon:"🥩",label:"Alimenti"},{id:"shopping",icon:"🛒",label:"Spesa"},{id:"settings",icon:"⚙️",label:"Impostazioni"}].map(n=>(
          <button key={n.id} className="tap" onClick={()=>setTab(n.id)}
            style={{flex:1,background:"none",border:"none",color:tab===n.id?"#a8e6cf":"#404040",
              fontSize:9,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"3px 0",cursor:"pointer"}}>
            <span style={{fontSize:19}}>{n.icon}</span>
            <span style={{fontWeight:tab===n.id?700:400,letterSpacing:0.3}}>{n.label}</span>
          </button>
        ))}
      </div>

      {modal&&(
        <ModalOverlay onClose={()=>setModal(null)}>
          {modal.type==="addItem"&&<AddItemModal foods={foods} recipes={recipes} onAdd={id=>{addItemToSlot(modal.date,modal.slotId,id);setModal(null);}} onClose={()=>setModal(null)}/>}
        </ModalOverlay>
      )}
    </div>
  );
}

// ─── DAY VIEW ─────────────────────────────────────────────────────────────────
function DayView({selectedDate,profiles,getSlotItems,getMacrosForSlot,getFoodOrRecipe,computeDayTotals,setModal,getDayType,removeItemFromSlot,copyDay,weekDates}){
  const totG=computeDayTotals("giusy",selectedDate),totD=computeDayTotals("davide",selectedDate);
  const tgG=profiles.giusy[getDayType(selectedDate,"giusy")],tgD=profiles.davide[getDayType(selectedDate,"davide")];
  const [copyTo,setCopyTo]=useState("");
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:14}}>
        {[["giusy",totG,tgG],["davide",totD,tgD]].map(([who,tot,tg])=>(
          <div key={who} style={{background:"#161616",borderRadius:14,padding:"12px 10px",border:"1px solid #1e1e1e"}}>
            <div style={{fontSize:9,color:"#555",letterSpacing:2,textTransform:"uppercase",fontFamily:"'DM Mono',monospace",marginBottom:7}}>{profiles[who].name}</div>
            <div style={{display:"flex",justifyContent:"center",marginBottom:7}}><KcalRing current={tot.kcal} target={tg.kcal}/></div>
            <MacroBar label="P" val={tot.p} target={tg.p} color="#82b4ff"/>
            <MacroBar label="G" val={tot.g} target={tg.g} color="#ffb347"/>
            <MacroBar label="C" val={tot.c} target={tg.c} color="#ff87ab"/>
          </div>
        ))}
      </div>
      {SLOTS.map(slot=>{
        const items=getSlotItems(selectedDate,slot.id);
        const itemObjs=items.map(id=>getFoodOrRecipe(id)).filter(Boolean);
        const tgG=getMacrosForSlot("giusy",selectedDate,slot.id);
        const tgD=getMacrosForSlot("davide",selectedDate,slot.id);
        const gramsG=calcGrams(itemObjs,tgG.kcal,tgG.p,tgG.g,tgG.c);
        const gramsD=calcGrams(itemObjs,tgD.kcal,tgD.p,tgD.g,tgD.c);
        return(
          <div key={slot.id} style={{background:"#161616",borderRadius:14,marginBottom:10,border:"1px solid #1e1e1e",overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 13px"}}>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <span style={{fontSize:16}}>{slot.icon}</span>
                <span style={{fontWeight:600,fontSize:13}}>{slot.label}</span>
              </div>
              <div style={{display:"flex",gap:5,alignItems:"center"}}>
                <span style={{fontSize:9,color:"#555",fontFamily:"'DM Mono',monospace"}}>{tgG.kcal}G·{tgD.kcal}D kcal</span>
                <button onClick={()=>setModal({type:"addItem",date:selectedDate,slotId:slot.id})}
                  style={{background:"#a8e6cf22",border:"1px solid #a8e6cf55",color:"#a8e6cf",borderRadius:7,width:26,height:26,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>+</button>
              </div>
            </div>
            {itemObjs.length===0
              ?<div style={{padding:"0 13px 12px",color:"#383838",fontSize:11,fontStyle:"italic"}}>Nessun alimento aggiunto</div>
              :<div style={{padding:"0 9px 9px"}}>
                {itemObjs.map(item=>{
                  const gG=gramsG[item.id]||0,gD=gramsD[item.id]||0;
                  const mG=macrosFromGrams(item,gG),mD=macrosFromGrams(item,gD);
                  return(
                    <div key={item.id} style={{background:"#0f0f0f",borderRadius:9,padding:"9px 11px",marginBottom:5}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                        <span style={{fontWeight:600,fontSize:13}}>{item.name}</span>
                        <button onClick={()=>removeItemFromSlot(selectedDate,slot.id,item.id)}
                          style={{background:"none",border:"none",color:"#3a3a3a",fontSize:18,lineHeight:1,padding:0,cursor:"pointer"}}>×</button>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                        {[["giusy",gG,mG],["davide",gD,mD]].map(([who,gr,m])=>(
                          <div key={who} style={{background:"#161616",borderRadius:8,padding:"7px 9px"}}>
                            <div style={{fontSize:9,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:3,fontFamily:"'DM Mono',monospace"}}>{who}</div>
                            <div style={{fontSize:16,fontWeight:700,color:"#a8e6cf",fontFamily:"'DM Mono',monospace"}}>{gr}g</div>
                            <div style={{fontSize:9,color:"#444",fontFamily:"'DM Mono',monospace",marginTop:2,lineHeight:1.5}}>{m.kcal} kcal<br/>P {m.p}g · G {m.g}g · C {m.c}g</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            }
          </div>
        );
      })}
      <div style={{background:"#161616",borderRadius:12,padding:"10px 13px",marginBottom:16,border:"1px solid #1e1e1e",display:"flex",gap:7,alignItems:"center"}}>
        <span style={{fontSize:11,color:"#555",flexShrink:0}}>📋 Copia su</span>
        <select value={copyTo} onChange={e=>setCopyTo(e.target.value)}
          style={{flex:1,background:"#0f0f0f",border:"1px solid #252525",color:"#bbb",borderRadius:7,padding:"5px 7px",fontSize:11}}>
          <option value="">Seleziona giorno...</option>
          {weekDates.filter(d=>d!==selectedDate).map(d=>(
            <option key={d} value={d}>{DAYS_IT[(new Date(d).getDay()+6)%7]} {d.split("-")[2]}</option>
          ))}
        </select>
        <button onClick={()=>{if(copyTo){copyDay(selectedDate,copyTo);setCopyTo("");}}}
          style={{background:"#a8e6cf",color:"#0f0f0f",border:"none",borderRadius:7,padding:"6px 12px",fontWeight:700,fontSize:11,flexShrink:0,cursor:"pointer"}}>Copia</button>
      </div>
    </div>
  );
}

// ─── WEEK VIEW ────────────────────────────────────────────────────────────────
function WeekView({weekDates,profiles,getSlotItems,getMacrosForSlot,getFoodOrRecipe,computeDayTotals,getDayType,setDayType,setSelectedDate,setTab}){
  return(
    <div style={{overflowX:"auto",paddingBottom:8}}>
      <div style={{display:"grid",gridTemplateColumns:"62px repeat(7,minmax(86px,1fr))",gap:5,minWidth:700}}>
        <div/>
        {weekDates.map((d,i)=>{
          const isToday=d===todayISO();
          return(
            <div key={d} style={{textAlign:"center",padding:"5px 3px",background:isToday?"#1e2e26":"#161616",borderRadius:9,
              border:isToday?"1px solid #a8e6cf33":"1px solid #1e1e1e",cursor:"pointer"}}
              onClick={()=>{setSelectedDate(d);setTab("day");}}>
              <div style={{fontSize:9,color:isToday?"#a8e6cf":"#555",fontFamily:"'DM Mono',monospace"}}>{DAYS_IT[i]}</div>
              <div style={{fontWeight:700,fontSize:13,color:isToday?"#a8e6cf":"#bbb"}}>{d.split("-")[2]}</div>
              {["giusy","davide"].map(who=>(
                <div key={who} style={{display:"flex",justifyContent:"center",gap:2,marginTop:3}}>
                  <span style={{fontSize:8,color:"#444"}}>{profiles[who].name[0]}</span>
                  {["on","off"].map(t=>(
                    <button key={t} onClick={e=>{e.stopPropagation();setDayType(d,who,t);}}
                      style={{padding:"1px 4px",borderRadius:3,border:"none",fontSize:7,fontWeight:700,cursor:"pointer",
                        background:getDayType(d,who)===t?(t==="on"?"#a8e6cf":"#ffb3ba"):"#0f0f0f",
                        color:getDayType(d,who)===t?"#0f0f0f":"#333"}}>{t}</button>
                  ))}
                </div>
              ))}
            </div>
          );
        })}
        {SLOTS.map(slot=>(
          <React.Fragment key={slot.id}>
            <div style={{display:"flex",alignItems:"center",gap:3,padding:"3px 0"}}>
              <span style={{fontSize:13}}>{slot.icon}</span>
              <span style={{fontSize:8,color:"#555",lineHeight:1.2}}>{slot.label.split(" ")[0]}</span>
            </div>
            {weekDates.map(d=>{
              const items=getSlotItems(d,slot.id);
              return(
                <div key={d} onClick={()=>{setSelectedDate(d);setTab("day");}}
                  style={{background:"#161616",borderRadius:7,padding:"5px",border:"1px solid #1e1e1e",cursor:"pointer",minHeight:44}}>
                  {items.length===0?<div style={{fontSize:8,color:"#2a2a2a",textAlign:"center",marginTop:5}}>—</div>
                    :items.slice(0,2).map(id=>{const f=getFoodOrRecipe(id);return f?<div key={id} style={{fontSize:8,color:"#777",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",marginBottom:1}}>{f.name}</div>:null;})}
                  {items.length>2&&<div style={{fontSize:8,color:"#444"}}>+{items.length-2}</div>}
                </div>
              );
            })}
          </React.Fragment>
        ))}
        {["giusy","davide"].map(who=>(
          <React.Fragment key={who}>
            <div style={{display:"flex",alignItems:"center"}}>
              <span style={{fontSize:9,color:"#555"}}>{profiles[who].name}</span>
            </div>
            {weekDates.map(d=>{
              const tot=computeDayTotals(who,d),tg=profiles[who][getDayType(d,who)];
              const pct=Math.min(100,Math.round((tot.kcal/tg.kcal)*100));
              return(
                <div key={d} style={{background:"#161616",borderRadius:7,padding:"5px",border:"1px solid #1e1e1e",textAlign:"center"}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#a8e6cf",fontFamily:"'DM Mono',monospace"}}>{pct}%</div>
                  <div style={{height:3,background:"#0f0f0f",borderRadius:2,marginTop:2}}>
                    <div style={{width:`${pct}%`,height:"100%",background:"#a8e6cf",borderRadius:2}}/>
                  </div>
                  <div style={{fontSize:8,color:"#444",marginTop:2,fontFamily:"'DM Mono',monospace"}}>{tot.kcal}kc</div>
                </div>
              );
            })}
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

// ─── FOODS VIEW ───────────────────────────────────────────────────────────────
function FoodsView({foods,setFoods,recipes,setRecipes,stores}){
  const [activeTab,setActiveTab]=useState("foods");
  const [searchQ,setSearchQ]=useState("");
  const [showAdd,setShowAdd]=useState(false);
  const [editItem,setEditItem]=useState(null);
  const [form,setForm]=useState({name:"",kcal:"",p:"",g:"",c:"",storeId:"",cat:""});
  const [showAddRec,setShowAddRec]=useState(false);
  const [editRec,setEditRec]=useState(null);
  const [recForm,setRecForm]=useState({name:"",ingredients:[]});
  const [ingSearch,setIngSearch]=useState("");

  const filtered=activeTab==="foods"
    ?foods.filter(f=>f.name.toLowerCase().includes(searchQ.toLowerCase()))
    :recipes.filter(r=>r.name.toLowerCase().includes(searchQ.toLowerCase()));

  const selStore=stores.find(s=>s.id===form.storeId);

  const saveFood=()=>{
    if(!form.name.trim()) return;
    const item={id:editItem?.id||`f${Date.now()}`,name:form.name.trim(),kcal:+form.kcal,p:+form.p,g:+form.g,c:+form.c,storeId:form.storeId,cat:form.cat};
    if(editItem) setFoods(p=>p.map(f=>f.id===editItem.id?item:f));
    else setFoods(p=>[...p,item]);
    setForm({name:"",kcal:"",p:"",g:"",c:"",storeId:"",cat:""});setShowAdd(false);setEditItem(null);
  };
  const startEditFood=item=>{setEditItem(item);setForm({name:item.name,kcal:item.kcal,p:item.p,g:item.g,c:item.c,storeId:item.storeId||"",cat:item.cat||""});setShowAdd(true);};
  const deleteFood=id=>{if(window.confirm("Eliminare alimento?"))setFoods(p=>p.filter(f=>f.id!==id));};

  const computeRecipeMacros=ings=>{
    let kc=0,pt=0,gr=0,ca=0,tw=0;
    ings.forEach(ing=>{const f=foods.find(x=>x.id===ing.foodId);if(!f) return;const fc=ing.grams/100;kc+=f.kcal*fc;pt+=f.p*fc;gr+=f.g*fc;ca+=f.c*fc;tw+=ing.grams;});
    if(!tw) return{kcal:0,p:0,g:0,c:0};
    return{kcal:Math.round((kc/tw)*100),p:Math.round((pt/tw)*100*10)/10,g:Math.round((gr/tw)*100*10)/10,c:Math.round((ca/tw)*100*10)/10};
  };
  const saveRecipe=()=>{
    if(!recForm.name||!recForm.ingredients.length) return;
    const m=computeRecipeMacros(recForm.ingredients);
    const item={id:editRec?.id||`r${Date.now()}`,name:recForm.name,...m,ingredients:recForm.ingredients};
    if(editRec) setRecipes(p=>p.map(r=>r.id===editRec.id?item:r));
    else setRecipes(p=>[...p,item]);
    setRecForm({name:"",ingredients:[]});setShowAddRec(false);setEditRec(null);
  };
  const deleteRecipe=id=>{if(window.confirm("Eliminare ricetta?"))setRecipes(p=>p.filter(r=>r.id!==id));};
  const ingFiltered=foods.filter(f=>f.name.toLowerCase().includes(ingSearch.toLowerCase()));

  // Group foods by store for display
  const storeGroups={};
  filtered.forEach(f=>{
    const s=stores.find(x=>x.id===f.storeId);
    const k=s?s.name:"Senza negozio";
    if(!storeGroups[k]) storeGroups[k]=[];
    storeGroups[k].push(f);
  });

  return(
    <div>
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {["foods","recipes"].map(t=>(
          <button key={t} onClick={()=>setActiveTab(t)}
            style={{flex:1,padding:"8px",borderRadius:9,border:"none",fontWeight:600,fontSize:12,cursor:"pointer",
              background:activeTab===t?"#a8e6cf":"#161616",color:activeTab===t?"#0f0f0f":"#555"}}>
            {t==="foods"?"🥩 Alimenti":"📖 Ricette"}
          </button>
        ))}
      </div>
      <div style={{display:"flex",gap:7,marginBottom:12}}>
        <input placeholder={`Cerca ${activeTab==="foods"?"alimento":"ricetta"}...`} value={searchQ} onChange={e=>setSearchQ(e.target.value)}
          style={{flex:1,background:"#161616",border:"1px solid #252525",color:"#fff",borderRadius:9,padding:"8px 11px",fontSize:13}}/>
        <button onClick={()=>{if(activeTab==="foods"){setShowAdd(true);setEditItem(null);setForm({name:"",kcal:"",p:"",g:"",c:"",storeId:"",cat:""});}else{setShowAddRec(true);setEditRec(null);setRecForm({name:"",ingredients:[]});}}}
          style={{background:"#a8e6cf",color:"#0f0f0f",border:"none",borderRadius:9,padding:"0 16px",fontWeight:700,fontSize:18,cursor:"pointer"}}>+</button>
      </div>

      {/* Food form */}
      {showAdd&&activeTab==="foods"&&(
        <div style={{background:"#161616",borderRadius:13,padding:13,marginBottom:12,border:"1px solid #a8e6cf22"}}>
          <div style={{fontWeight:700,marginBottom:10}}>{editItem?"Modifica":"Nuovo"} alimento</div>
          <label style={{fontSize:11,color:"#666",display:"block",marginBottom:3}}>Nome</label>
          <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="es. Petto di pollo"
            style={{width:"100%",background:"#0f0f0f",border:"1px solid #2a2a2a",color:"#fff",borderRadius:7,padding:"8px 10px",fontSize:13,marginBottom:10}}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:7,marginBottom:10}}>
            {[["kcal","Kcal/100g"],["p","Prot (g)"],["g","Grassi (g)"],["c","Carbo (g)"]].map(([k,lbl])=>(
              <div key={k}>
                <label style={{fontSize:10,color:"#666",display:"block",marginBottom:3}}>{lbl}</label>
                <input type="number" value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}
                  style={{width:"100%",background:"#0f0f0f",border:"1px solid #2a2a2a",color:"#fff",borderRadius:7,padding:"7px 6px",fontSize:12,textAlign:"center"}}/>
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
            <div>
              <label style={{fontSize:11,color:"#666",display:"block",marginBottom:3}}>Supermercato</label>
              <select value={form.storeId} onChange={e=>setForm(f=>({...f,storeId:e.target.value,cat:""}))}
                style={{width:"100%",background:"#0f0f0f",border:"1px solid #2a2a2a",color:form.storeId?"#fff":"#555",borderRadius:7,padding:"7px 8px",fontSize:12}}>
                <option value="">Nessuno</option>
                {stores.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
            <div>
              <label style={{fontSize:11,color:"#666",display:"block",marginBottom:3}}>Categoria</label>
              <select value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))} disabled={!form.storeId}
                style={{width:"100%",background:"#0f0f0f",border:"1px solid #2a2a2a",color:form.cat?"#fff":"#555",borderRadius:7,padding:"7px 8px",fontSize:12,opacity:form.storeId?1:0.4}}>
                <option value="">Seleziona...</option>
                {(selStore?.cats||[]).map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
          </div>
          <div style={{display:"flex",gap:7}}>
            <button onClick={saveFood} style={{flex:1,background:"#a8e6cf",color:"#0f0f0f",border:"none",borderRadius:8,padding:9,fontWeight:700,cursor:"pointer"}}>Salva</button>
            <button onClick={()=>{setShowAdd(false);setEditItem(null);}} style={{flex:1,background:"#252525",color:"#bbb",border:"none",borderRadius:8,padding:9,cursor:"pointer"}}>Annulla</button>
          </div>
        </div>
      )}

      {/* Recipe form */}
      {showAddRec&&activeTab==="recipes"&&(
        <div style={{background:"#161616",borderRadius:13,padding:13,marginBottom:12,border:"1px solid #a8e6cf22"}}>
          <div style={{fontWeight:700,marginBottom:10}}>{editRec?"Modifica":"Nuova"} ricetta</div>
          <input placeholder="Nome ricetta" value={recForm.name} onChange={e=>setRecForm(f=>({...f,name:e.target.value}))}
            style={{width:"100%",background:"#0f0f0f",border:"1px solid #2a2a2a",color:"#fff",borderRadius:7,padding:"8px 10px",fontSize:13,marginBottom:10}}/>
          <div style={{fontWeight:600,fontSize:12,marginBottom:6,color:"#777"}}>Ingredienti</div>
          {recForm.ingredients.map((ing,i)=>{
            const food=foods.find(f=>f.id===ing.foodId);
            return(
              <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:6,background:"#0f0f0f",borderRadius:7,padding:"6px 8px"}}>
                <span style={{flex:1,fontSize:12,color:"#ccc"}}>{food?.name}</span>
                <input type="number" value={ing.grams} onChange={e=>setRecForm(f=>({...f,ingredients:f.ingredients.map((ii,j)=>j===i?{...ii,grams:+e.target.value}:ii)}))}
                  style={{width:58,background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#fff",borderRadius:6,padding:"4px 6px",fontSize:12,textAlign:"center"}}/>
                <span style={{fontSize:10,color:"#444"}}>g</span>
                <button onClick={()=>setRecForm(f=>({...f,ingredients:f.ingredients.filter((_,j)=>j!==i)}))}
                  style={{background:"none",border:"none",color:"#555",fontSize:16,cursor:"pointer"}}>×</button>
              </div>
            );
          })}
          <input placeholder="Cerca ingrediente..." value={ingSearch} onChange={e=>setIngSearch(e.target.value)}
            style={{width:"100%",background:"#0f0f0f",border:"1px solid #2a2a2a",color:"#fff",borderRadius:7,padding:"7px 10px",fontSize:12,marginBottom:4,marginTop:6}}/>
          {ingSearch&&(
            <div style={{background:"#0f0f0f",borderRadius:8,border:"1px solid #252525",maxHeight:140,overflowY:"auto",marginBottom:8}}>
              {ingFiltered.slice(0,8).map(f=>(
                <div key={f.id} onClick={()=>{setRecForm(rf=>({...rf,ingredients:[...rf.ingredients,{foodId:f.id,grams:100}]}));setIngSearch("");}}
                  style={{padding:"8px 10px",cursor:"pointer",borderBottom:"1px solid #161616",fontSize:12,color:"#ccc",display:"flex",justifyContent:"space-between"}}>
                  <span>{f.name}</span><span style={{color:"#444",fontFamily:"'DM Mono',monospace"}}>{f.kcal}kc</span>
                </div>
              ))}
              {ingFiltered.length===0&&<div style={{padding:"8px 10px",fontSize:12,color:"#444"}}>Nessun risultato</div>}
            </div>
          )}
          <div style={{display:"flex",gap:7,marginTop:8}}>
            <button onClick={saveRecipe} style={{flex:1,background:"#a8e6cf",color:"#0f0f0f",border:"none",borderRadius:8,padding:9,fontWeight:700,cursor:"pointer"}}>Salva</button>
            <button onClick={()=>{setShowAddRec(false);setEditRec(null);}} style={{flex:1,background:"#252525",color:"#bbb",border:"none",borderRadius:8,padding:9,cursor:"pointer"}}>Annulla</button>
          </div>
        </div>
      )}

      {/* Foods list grouped by store */}
      {activeTab==="foods"&&(
        filtered.length===0
          ?<div style={{textAlign:"center",color:"#333",padding:"40px 0",fontSize:13}}><div style={{fontSize:36,marginBottom:8}}>🥩</div>Nessun alimento. Aggiungine uno con +</div>
          :Object.entries(storeGroups).map(([storeName,items],si)=>{
            const sc=STORE_COLORS[si%STORE_COLORS.length];
            return(
              <div key={storeName} style={{marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:7,paddingLeft:2}}>
                  <div style={{width:3,height:14,background:sc,borderRadius:2}}/>
                  <span style={{fontSize:10,color:sc,fontWeight:700,letterSpacing:2,textTransform:"uppercase",fontFamily:"'DM Mono',monospace"}}>🏪 {storeName}</span>
                </div>
                {items.map(item=>(
                  <div key={item.id} style={{background:"#161616",borderRadius:11,padding:"11px 13px",marginBottom:6,border:"1px solid #1e1e1e",display:"flex",alignItems:"center",gap:9}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:13}}>{item.name}</div>
                      <div style={{fontSize:10,color:"#444",fontFamily:"'DM Mono',monospace",marginTop:2}}>{item.kcal} kcal · P{item.p} G{item.g} C{item.c} /100g</div>
                      {item.cat&&<div style={{fontSize:9,color:"#555",marginTop:2}}>{item.cat}</div>}
                    </div>
                    <button onClick={()=>startEditFood(item)} style={{background:"#252525",border:"none",color:"#a8e6cf",borderRadius:7,padding:"5px 9px",fontSize:13,cursor:"pointer"}}>✏️</button>
                    <button onClick={()=>deleteFood(item.id)} style={{background:"#252525",border:"none",color:"#ff6b6b",borderRadius:7,padding:"5px 9px",fontSize:13,cursor:"pointer"}}>🗑️</button>
                  </div>
                ))}
              </div>
            );
          })
      )}
      {activeTab==="recipes"&&(
        filtered.length===0
          ?<div style={{textAlign:"center",color:"#333",padding:"40px 0",fontSize:13}}><div style={{fontSize:36,marginBottom:8}}>📖</div>Nessuna ricetta. Aggiungine una con +</div>
          :filtered.map(item=>(
            <div key={item.id} style={{background:"#161616",borderRadius:11,padding:"11px 13px",marginBottom:7,border:"1px solid #1e1e1e",display:"flex",alignItems:"center",gap:9}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:13}}>{item.name}</div>
                <div style={{fontSize:10,color:"#444",fontFamily:"'DM Mono',monospace",marginTop:2}}>{item.kcal} kcal · P{item.p} G{item.g} C{item.c} /100g</div>
                {item.ingredients&&<div style={{fontSize:10,color:"#555",marginTop:2}}>{item.ingredients.length} ingredienti</div>}
              </div>
              <button onClick={()=>{setEditRec(item);setRecForm({name:item.name,ingredients:item.ingredients||[]});setShowAddRec(true);}}
                style={{background:"#252525",border:"none",color:"#a8e6cf",borderRadius:7,padding:"5px 9px",fontSize:13,cursor:"pointer"}}>✏️</button>
              <button onClick={()=>deleteRecipe(item.id)} style={{background:"#252525",border:"none",color:"#ff6b6b",borderRadius:7,padding:"5px 9px",fontSize:13,cursor:"pointer"}}>🗑️</button>
            </div>
          ))
      )}
    </div>
  );
}

// ─── SHOPPING VIEW ────────────────────────────────────────────────────────────
function ShoppingView({weekDates,buildShoppingList,stores}){
  const [range,setRange]=useState({from:weekDates[0],to:weekDates[6]});
  const [checked,setChecked]=useState({});
  const [selStore,setSelStore]=useState("all");
  const [collapsed,setCollapsed]=useState({});

  const selectedDates=weekDates.filter(d=>d>=range.from&&d<=range.to);
  const list=buildShoppingList(selectedDates);

  // Build store → cat → items map
  const grouped={};
  stores.forEach(s=>{grouped[s.name]={storeId:s.id,cats:{},count:0,color:STORE_COLORS[stores.indexOf(s)%STORE_COLORS.length]};});
  list.forEach(({item,total})=>{
    const s=stores.find(x=>x.id===item.storeId);
    const sName=s?s.name:"Senza negozio";
    const cat=item.cat||"Altro";
    if(!grouped[sName]) grouped[sName]={storeId:null,cats:{},count:0,color:"#888"};
    if(!grouped[sName].cats[cat]) grouped[sName].cats[cat]=[];
    grouped[sName].cats[cat].push({item,total});
    grouped[sName].count++;
  });

  const activeStores=Object.keys(grouped).filter(n=>grouped[n].count>0);
  const displayStores=selStore==="all"?activeStores:activeStores.filter(n=>n===selStore);
  const toggle=id=>setChecked(p=>({...p,[id]:!p[id]}));
  const toggleCollapse=n=>setCollapsed(p=>({...p,[n]:!p[n]}));
  const totalItems=list.length;
  const checkedCount=Object.values(checked).filter(Boolean).length;

  return(
    <div>
      {/* Date range */}
      <div style={{background:"#161616",borderRadius:13,padding:"11px 13px",marginBottom:11,border:"1px solid #1e1e1e"}}>
        <div style={{fontSize:11,color:"#666",marginBottom:7}}>Periodo spesa</div>
        <div style={{display:"flex",gap:7,alignItems:"center"}}>
          <select value={range.from} onChange={e=>setRange(r=>({...r,from:e.target.value}))}
            style={{flex:1,background:"#0f0f0f",border:"1px solid #2a2a2a",color:"#bbb",borderRadius:7,padding:"6px 8px",fontSize:11}}>
            {weekDates.map(d=><option key={d} value={d}>{fmtDateFull(d)}</option>)}
          </select>
          <span style={{color:"#444"}}>→</span>
          <select value={range.to} onChange={e=>setRange(r=>({...r,to:e.target.value}))}
            style={{flex:1,background:"#0f0f0f",border:"1px solid #2a2a2a",color:"#bbb",borderRadius:7,padding:"6px 8px",fontSize:11}}>
            {weekDates.map(d=><option key={d} value={d}>{fmtDateFull(d)}</option>)}
          </select>
        </div>
      </div>

      {/* Store filter tabs */}
      <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:6,marginBottom:10}}>
        <button onClick={()=>setSelStore("all")} className="tap"
          style={{flexShrink:0,padding:"5px 12px",borderRadius:20,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",
            background:selStore==="all"?"#a8e6cf":"#161616",color:selStore==="all"?"#0f0f0f":"#555"}}>
          Tutti ({totalItems})
        </button>
        {activeStores.map(n=>(
          <button key={n} onClick={()=>setSelStore(n)} className="tap"
            style={{flexShrink:0,padding:"5px 12px",borderRadius:20,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",
              background:selStore===n?grouped[n].color:"#161616",color:selStore===n?"#0f0f0f":"#555"}}>
            {n} ({grouped[n].count})
          </button>
        ))}
      </div>

      {/* Progress */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{fontSize:12,color:"#555"}}>{checkedCount}/{totalItems} spuntati</span>
        <button onClick={()=>setChecked({})} style={{background:"none",border:"none",color:"#555",fontSize:11,cursor:"pointer"}}>Reset ✕</button>
      </div>

      {totalItems===0&&(
        <div style={{textAlign:"center",color:"#333",padding:"48px 0",fontSize:13}}>
          <div style={{fontSize:42,marginBottom:10}}>🛒</div>
          <div>Pianifica i pasti nella tab Oggi</div>
          <div style={{marginTop:4,color:"#2a2a2a"}}>La lista si genera in automatico</div>
        </div>
      )}

      {/* Store blocks */}
      {displayStores.map(storeName=>{
        const sg=grouped[storeName];
        const sc=sg.color;
        const isOpen=!collapsed[storeName];
        const allItems=Object.values(sg.cats).flat();
        const storeChecked=allItems.filter(({item})=>checked[item.id]).length;
        return(
          <div key={storeName} style={{marginBottom:14,borderRadius:14,overflow:"hidden",border:`1px solid ${sc}33`}}>
            {/* Store header */}
            <div onClick={()=>toggleCollapse(storeName)} className="tap"
              style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer",
                background:`linear-gradient(135deg,#1a1a1a 0%,${sc}14 100%)`,
                borderBottom:isOpen?`1px solid ${sc}22`:"none"}}>
              <span style={{fontSize:20}}>🏪</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:15}}>{storeName}</div>
                <div style={{fontSize:10,color:"#666",marginTop:1,fontFamily:"'DM Mono',monospace"}}>
                  {storeChecked}/{allItems.length} articoli · {Object.keys(sg.cats).length} categorie
                </div>
              </div>
              {/* Progress ring */}
              <svg width={34} height={34}>
                <circle cx={17} cy={17} r={13} fill="none" stroke="#2a2a2a" strokeWidth={3}/>
                <circle cx={17} cy={17} r={13} fill="none" stroke={sc} strokeWidth={3}
                  strokeDasharray={`${allItems.length>0?storeChecked/allItems.length*82:0} 82`}
                  strokeLinecap="round" transform="rotate(-90 17 17)"/>
                <text x={17} y={21} textAnchor="middle" fill={sc} fontSize={8} fontWeight={700} fontFamily="'DM Mono',monospace">
                  {allItems.length>0?Math.round(storeChecked/allItems.length*100):0}%
                </text>
              </svg>
              <span style={{color:"#555",fontSize:12}}>{isOpen?"▲":"▼"}</span>
            </div>

            {/* Categories + items */}
            {isOpen&&(
              <div style={{background:"#141414",padding:"10px 12px 14px"}}>
                {Object.entries(sg.cats).map(([cat,items],ci,arr)=>(
                  <div key={cat} style={{marginBottom:ci<arr.length-1?14:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:7}}>
                      <div style={{width:3,height:14,background:sc,borderRadius:2,flexShrink:0}}/>
                      <span style={{fontSize:10,color:sc,fontWeight:700,letterSpacing:2,textTransform:"uppercase",fontFamily:"'DM Mono',monospace"}}>{cat}</span>
                      <span style={{fontSize:10,color:"#444"}}>({items.length})</span>
                    </div>
                    {items.map(({item,total})=>(
                      <div key={item.id} onClick={()=>toggle(item.id)} className="tap"
                        style={{background:checked[item.id]?"#111":"#1a1a1a",borderRadius:9,padding:"9px 12px",marginBottom:5,
                          border:`1px solid ${checked[item.id]?"#1e1e1e":sc+"22"}`,cursor:"pointer",
                          display:"flex",alignItems:"center",gap:9,opacity:checked[item.id]?0.4:1,transition:"all 0.2s"}}>
                        <div style={{width:20,height:20,borderRadius:6,flexShrink:0,
                          border:checked[item.id]?"none":`1.5px solid #3a3a3a`,
                          background:checked[item.id]?sc:"transparent",
                          display:"flex",alignItems:"center",justifyContent:"center"}}>
                          {checked[item.id]&&<span style={{fontSize:12,color:"#0f0f0f",fontWeight:700}}>✓</span>}
                        </div>
                        <span style={{flex:1,fontSize:13,textDecoration:checked[item.id]?"line-through":"none",color:checked[item.id]?"#555":"#e8e8e8"}}>{item.name}</span>
                        <div style={{textAlign:"right",flexShrink:0}}>
                          <div style={{fontSize:15,fontWeight:700,color:sc,fontFamily:"'DM Mono',monospace"}}>{Math.round(total)}g</div>
                          <div style={{fontSize:9,color:"#444"}}>G+D</div>
                        </div>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── SETTINGS VIEW ────────────────────────────────────────────────────────────
function SettingsView({profiles,setProfiles,splits,setSplits,stores,setStores,foods,setFoods,resetAll}){
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({});
  const [splitForm,setSplitForm]=useState({...splits});
  const [storeEdit,setStoreEdit]=useState(null); // null | "new" | store obj
  const [storeForm,setStoreForm]=useState({name:"",cats:[]});
  const [newCat,setNewCat]=useState("");

  const startEdit=(who,dt)=>{setEditing({who,dt});setForm({...profiles[who][dt]});};
  const saveEdit=()=>{setProfiles(p=>({...p,[editing.who]:{...p[editing.who],[editing.dt]:{kcal:+form.kcal,p:+form.p,g:+form.g,c:+form.c}}}));setEditing(null);};
  const splitTotal=Object.values(splitForm).reduce((a,b)=>a+(+b),0);

  const openNewStore=()=>{setStoreEdit("new");setStoreForm({name:"",cats:[]});setNewCat("");};
  const openEditStore=s=>{setStoreEdit(s);setStoreForm({name:s.name,cats:[...s.cats]});setNewCat("");};
  const addCat=()=>{if(newCat.trim()&&!storeForm.cats.includes(newCat.trim())){setStoreForm(f=>({...f,cats:[...f.cats,newCat.trim()]}));setNewCat("");}};
  const saveStore=()=>{
    if(!storeForm.name.trim()) return;
    if(storeEdit==="new"){
      setStores(p=>[...p,{id:`s${Date.now()}`,name:storeForm.name.trim(),cats:storeForm.cats}]);
    } else {
      setFoods(prev=>prev.map(f=>f.storeId===storeEdit.id&&!storeForm.cats.includes(f.cat)?{...f,cat:""}:f));
      setStores(p=>p.map(s=>s.id===storeEdit.id?{...s,name:storeForm.name.trim(),cats:storeForm.cats}:s));
    }
    setStoreEdit(null);
  };
  const deleteStore=id=>{
    if(!window.confirm("Eliminare supermercato?")) return;
    setStores(p=>p.filter(s=>s.id!==id));
    setFoods(prev=>prev.map(f=>f.storeId===id?{...f,storeId:"",cat:""}:f));
  };

  if(storeEdit!==null){
    return(
      <div>
        <div style={{fontWeight:700,fontSize:16,marginBottom:14}}>{storeEdit==="new"?"Nuovo":"Modifica"} supermercato</div>
        <div style={{background:"#161616",borderRadius:13,padding:13,marginBottom:12,border:"1px solid #1e1e1e"}}>
          <label style={{fontSize:11,color:"#666",display:"block",marginBottom:4}}>Nome</label>
          <input value={storeForm.name} onChange={e=>setStoreForm(f=>({...f,name:e.target.value}))}
            style={{width:"100%",background:"#0f0f0f",border:"1px solid #2a2a2a",color:"#fff",borderRadius:7,padding:"8px 10px",fontSize:13,marginBottom:12}}/>
          <div style={{fontWeight:600,fontSize:12,marginBottom:7,color:"#888"}}>Sottocategorie</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
            {storeForm.cats.map(c=>(
              <div key={c} style={{display:"flex",alignItems:"center",gap:4,background:"#0f0f0f",borderRadius:20,padding:"4px 10px",border:"1px solid #2a2a2a"}}>
                <span style={{fontSize:12}}>{c}</span>
                <button onClick={()=>setStoreForm(f=>({...f,cats:f.cats.filter(x=>x!==c)}))}
                  style={{background:"none",border:"none",color:"#555",fontSize:14,lineHeight:1,padding:0,cursor:"pointer"}}>×</button>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:7}}>
            <input value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder="Nuova sottocategoria..."
              onKeyDown={e=>e.key==="Enter"&&addCat()}
              style={{flex:1,background:"#0f0f0f",border:"1px solid #2a2a2a",color:"#fff",borderRadius:7,padding:"7px 10px",fontSize:12}}/>
            <button onClick={addCat} style={{background:"#a8e6cf22",border:"1px solid #a8e6cf44",color:"#a8e6cf",borderRadius:7,padding:"0 14px",fontSize:18,fontWeight:700,cursor:"pointer"}}>+</button>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={saveStore} style={{flex:1,background:"#a8e6cf",color:"#0f0f0f",border:"none",borderRadius:10,padding:10,fontWeight:700,cursor:"pointer"}}>Salva</button>
          <button onClick={()=>setStoreEdit(null)} style={{flex:1,background:"#252525",color:"#bbb",border:"none",borderRadius:10,padding:10,cursor:"pointer"}}>Annulla</button>
        </div>
      </div>
    );
  }

  return(
    <div>
      {/* Profiles */}
      {["giusy","davide"].map(who=>(
        <div key={who} style={{background:"#161616",borderRadius:14,padding:14,marginBottom:14,border:"1px solid #1e1e1e"}}>
          <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>{profiles[who].name}</div>
          {["on","off"].map(dt=>(
            <div key={dt} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                <span style={{background:dt==="on"?"#a8e6cf":"#ffb3ba",borderRadius:6,padding:"2px 9px",fontSize:10,fontWeight:700,color:"#0f0f0f"}}>{dt.toUpperCase()}</span>
                <button onClick={()=>startEdit(who,dt)} style={{background:"#252525",border:"none",color:"#a8e6cf",borderRadius:7,padding:"4px 12px",fontSize:12,cursor:"pointer"}}>Modifica</button>
              </div>
              {editing?.who===who&&editing?.dt===dt?(
                <div style={{background:"#0f0f0f",borderRadius:10,padding:11}}>
                  {[["kcal","Kcal"],["p","Proteine (g)"],["g","Grassi (g)"],["c","Carboidrati (g)"]].map(([field,lbl])=>(
                    <div key={field} style={{marginBottom:8}}>
                      <label style={{fontSize:10,color:"#666",display:"block",marginBottom:2}}>{lbl}</label>
                      <input type="number" value={form[field]} onChange={e=>setForm(f=>({...f,[field]:e.target.value}))}
                        style={{width:"100%",background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#fff",borderRadius:7,padding:"8px 10px",fontSize:13}}/>
                    </div>
                  ))}
                  <div style={{display:"flex",gap:7,marginTop:8}}>
                    <button onClick={saveEdit} style={{flex:1,background:"#a8e6cf",color:"#0f0f0f",border:"none",borderRadius:7,padding:9,fontWeight:700,cursor:"pointer"}}>Salva</button>
                    <button onClick={()=>setEditing(null)} style={{flex:1,background:"#252525",color:"#bbb",border:"none",borderRadius:7,padding:9,cursor:"pointer"}}>Annulla</button>
                  </div>
                </div>
              ):(
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5}}>
                  {[["kcal",profiles[who][dt].kcal,"kcal"],["p",profiles[who][dt].p,"prot"],["g",profiles[who][dt].g,"grassi"],["c",profiles[who][dt].c,"carbo"]].map(([k,v,u])=>(
                    <div key={k} style={{background:"#0f0f0f",borderRadius:8,padding:"8px",textAlign:"center"}}>
                      <div style={{fontSize:14,fontWeight:700,color:"#a8e6cf",fontFamily:"'DM Mono',monospace"}}>{v}</div>
                      <div style={{fontSize:8,color:"#444",marginTop:1}}>{u}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
      ))}

      {/* Splits */}
      <div style={{background:"#161616",borderRadius:14,padding:14,marginBottom:14,border:"1px solid #1e1e1e"}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>Distribuzione % per pasto</div>
        <div style={{fontSize:11,color:"#666",marginBottom:11}}>Totale: {Math.round(splitTotal)}% {Math.round(splitTotal)!==100&&<span style={{color:"#ff6b6b"}}>(deve fare 100)</span>}</div>
        {SLOTS.map(slot=>(
          <div key={slot.id} style={{display:"flex",alignItems:"center",gap:9,marginBottom:9}}>
            <span style={{width:22,fontSize:14}}>{slot.icon}</span>
            <span style={{flex:1,fontSize:12}}>{slot.label}</span>
            <input type="number" value={splitForm[slot.id]} min={0} max={100}
              onChange={e=>setSplitForm(f=>({...f,[slot.id]:+e.target.value}))}
              style={{width:54,background:"#0f0f0f",border:"1px solid #2a2a2a",color:"#fff",borderRadius:7,padding:"5px 7px",fontSize:12,textAlign:"center"}}/>
            <span style={{fontSize:11,color:"#555"}}>%</span>
          </div>
        ))}
        <button onClick={()=>{if(Math.round(splitTotal)===100)setSplits({...splitForm});}} disabled={Math.round(splitTotal)!==100}
          style={{width:"100%",background:Math.round(splitTotal)===100?"#a8e6cf":"#252525",color:Math.round(splitTotal)===100?"#0f0f0f":"#555",border:"none",borderRadius:9,padding:9,fontWeight:700,fontSize:13,cursor:"pointer"}}>
          Salva distribuzione
        </button>
      </div>

      {/* Stores management */}
      <div style={{background:"#161616",borderRadius:14,padding:14,marginBottom:14,border:"1px solid #1e1e1e"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:15}}>Supermercati</div>
          <button onClick={openNewStore} style={{background:"#a8e6cf",color:"#0f0f0f",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ Aggiungi</button>
        </div>
        {stores.map((s,si)=>(
          <div key={s.id} style={{background:"#0f0f0f",borderRadius:10,padding:"10px 12px",marginBottom:8,border:`1px solid ${STORE_COLORS[si%STORE_COLORS.length]}22`}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <span style={{fontSize:16}}>🏪</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:13}}>{s.name}</div>
                <div style={{fontSize:10,color:"#555",marginTop:1}}>{s.cats.length} categorie</div>
              </div>
              <button onClick={()=>openEditStore(s)} style={{background:"#252525",border:"none",color:"#a8e6cf",borderRadius:7,padding:"4px 8px",fontSize:12,cursor:"pointer"}}>✏️</button>
              <button onClick={()=>deleteStore(s.id)} style={{background:"#252525",border:"none",color:"#ff6b6b",borderRadius:7,padding:"4px 8px",fontSize:12,cursor:"pointer"}}>🗑️</button>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {s.cats.map(c=><span key={c} style={{fontSize:9,color:"#666",background:"#1a1a1a",borderRadius:4,padding:"2px 6px"}}>{c}</span>)}
            </div>
          </div>
        ))}
      </div>

      {/* Reset */}
      <div style={{background:"#1a0f0f",borderRadius:14,padding:14,border:"1px solid #3a1a1a"}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:4,color:"#ff6b6b"}}>⚠️ Reset dati</div>
        <div style={{fontSize:12,color:"#666",marginBottom:10}}>Elimina tutti gli alimenti, ricette e piano pasti. I profili vengono ripristinati ai valori di default.</div>
        <button onClick={resetAll} style={{width:"100%",background:"#ff6b6b22",color:"#ff6b6b",border:"1px solid #ff6b6b44",borderRadius:9,padding:10,fontWeight:700,fontSize:13,cursor:"pointer"}}>
          Elimina tutti i dati
        </button>
      </div>
    </div>
  );
}

// ─── ADD ITEM MODAL ────────────────────────────────────────────────────────────

            style={{padding:"10px 12px",borderRadius:9,marginBottom:6,background:"#1a1a1a",cursor:"pointer",border:"1px solid #252525",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontWeight:600,fontSize:13}}>{item.name}</div>
              <div style={{fontSize:10,color:"#444",fontFamily:"'DM Mono',monospace",marginTop:1}}>{item.kcal} kcal · P{item.p} G{item.g} C{item.c}</div>
            </div>
            <span style={{color:"#a8e6cf",fontSize:20}}>+</span>
          </div>
        ))}
        {filtered.length===0&&<div style={{color:"#3a3a3a",textAlign:"center",padding:20,fontSize:13}}>
          {all.length===0?"Aggiungi prima alimenti nella tab 🥩":"Nessun risultato"}
        </div>}
      </div>
    </div>
  );
}

<!-- ═══ SERVICE WORKER (offline support) ═══════════════════════════════════ -->
<script>
if ('serviceWorker' in navigator) {
  // Inline the SW as a Blob so we don't need a separate sw.js file
  const swCode = `
    const CACHE = 'nutrition-hub-v1';
    const ASSETS = [
      self.location.href.replace(/\\/sw-inline.js.*/, '') || '/',
      'https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap',
      'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js',
    ];

    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open(CACHE).then(cache => {
          // Cache what we can, ignore failures (e.g. opaque cross-origin)
          return Promise.allSettled(ASSETS.map(url => cache.add(url).catch(() => {})));
        }).then(() => self.skipWaiting())
      );
    });

    self.addEventListener('activate', e => {
      e.waitUntil(
        caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        ).then(() => self.clients.claim())
      );
    });

    self.addEventListener('fetch', e => {
      // Network-first for same-origin HTML (gets updates), cache-first for CDN assets
      const isCDN = e.request.url.includes('cdnjs') || e.request.url.includes('fonts.google');
      if (isCDN) {
        e.respondWith(
          caches.match(e.request).then(cached => cached || fetch(e.request).then(res => {
            const clone = res.clone();
            caches.open(CACHE).then(c => c.put(e.request, clone));
            return res;
          }))
        );
      } else {
        e.respondWith(
          fetch(e.request).then(res => {
            const clone = res.clone();
            caches.open(CACHE).then(c => c.put(e.request, clone));
            return res;
          }).catch(() => caches.match(e.request))
        );
      }
    });
  `;

  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swURL = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swURL, { scope: '/' })
    .then(() => console.log('Nutrition Hub: offline ready ✓'))
    .catch(e => console.log('SW skipped (normal on file://):', e.message));
}
